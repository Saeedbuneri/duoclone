<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="30" ry="34" fill="#58CC02"/>
  <!-- Belly -->
  <ellipse cx="50" cy="65" rx="20" ry="22" fill="#89E219"/>
  <!-- Left eye white -->
  <ellipse cx="38" cy="42" rx="14" ry="15" fill="white"/>
  <!-- Right eye white -->
  <ellipse cx="62" cy="42" rx="14" ry="15" fill="white"/>
  <!-- Left pupil -->
  <circle cx="41" cy="43" r="6" fill="#3C3C3C"/>
  <!-- Right pupil -->
  <circle cx="59" cy="43" r="6" fill="#3C3C3C"/>
  <!-- Left eye shine -->
  <circle cx="39" cy="40" r="2.5" fill="white"/>
  <!-- Right eye shine -->
  <circle cx="57" cy="40" r="2.5" fill="white"/>
  <!-- Beak -->
  <ellipse cx="50" cy="55" rx="7" ry="5" fill="#FFC800"/>
  <ellipse cx="50" cy="53" rx="7" ry="4" fill="#FFD900"/>
  <!-- Left wing -->
  <ellipse cx="22" cy="62" rx="8" ry="16" fill="#46A302" transform="rotate(10, 22, 62)"/>
  <!-- Right wing -->
  <ellipse cx="78" cy="62" rx="8" ry="16" fill="#46A302" transform="rotate(-10, 78, 62)"/>
  <!-- Left foot -->
  <ellipse cx="40" cy="90" rx="8" ry="4" fill="#FFC800"/>
  <!-- Right foot -->
  <ellipse cx="60" cy="90" rx="8" ry="4" fill="#FFC800"/>
  <!-- Left ear tuft -->
  <ellipse cx="30" cy="26" rx="4" ry="8" fill="#58CC02" transform="rotate(-15, 30, 26)"/>
  <!-- Right ear tuft -->
  <ellipse cx="70" cy="26" rx="4" ry="8" fill="#58CC02" transform="rotate(15, 70, 26)"/>
</svg>
