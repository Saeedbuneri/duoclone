<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dicto - Learn a language for free!</title>
  <meta name="description"
    content="Dicto is a fun, free, and effective way to learn a new language. Science-based lessons that actually work." />
  <meta name="keywords"
    content="learn, spanish, german, french, portuguese, italian, english, free, lessons, course, language, dicto" />
  <meta property="og:title" content="Dicto - Learn a language for free!" />
  <meta property="og:description"
    content="Learn languages by playing a game. It's 100% free, fun, and scientifically proven to work." />
  <link rel="icon" type="image/svg+xml" href="/duo-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="initial-loader"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;gap:24px;">
    <img src="/duo-icon.svg"
      style="width:100px; animation: walkingDuo 0.8s infinite alternate linear, floatRotate 3.5s infinite linear;"
      alt="Starting Dicto..." />
    <div style="font-family:'Nunito',sans-serif;font-size:32px;font-weight:800;color:#58CC02;letter-spacing:-0.5px;">dicto</div>
    <div style="width:200px;height:8px;background:#E5E5E5;border-radius:4px;overflow:hidden;">
      <div style="height:100%;background:linear-gradient(90deg,#58CC02,#78CC02);border-radius:4px;animation:loadProgress 2.8s ease forwards;"></div>
    </div>
    <style>
      @keyframes loadProgress {
        0% { width: 0%; }
        60% { width: 70%; }
        90% { width: 90%; }
        100% { width: 100%; }
      }
      @keyframes floatRotate {
        0% { transform: translateY(0) rotate(-5deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
        100% { transform: translateY(0) rotate(-5deg); }
      }
      @keyframes walkingDuo {
        0% { transform: translateX(-30px) rotate(-15deg); }
        50% { transform: translateX(0px) translateY(-10px) rotate(15deg); }
        100% { transform: translateX(30px) rotate(-15deg); }
      }
    </style>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
