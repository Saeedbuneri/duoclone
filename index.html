<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Duolingo - Learn a language for free!</title>
  <meta name="description"
    content="Duolingo is the world's most popular way to learn a language. It's 100% free, fun and science-based." />
  <meta name="keywords"
    content="learn, spanish, german, french, portuguese, italian, english, free, lessons, course, language" />
  <meta property="og:title" content="Duolingo - Learn a language for free!" />
  <meta property="og:description"
    content="Learn languages by playing a game. It's 100% free, fun, and scientifically proven to work." />
  <link rel="icon" type="image/svg+xml" href="/duo-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="initial-loader"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;">
    <img src="/duo-icon.svg"
      style="width:100px; animation: walkingDuo 0.8s infinite alternate linear, floatRotate 3.5s infinite linear; margin-bottom: 24px;"
      alt="Starting Duo..." />
    <style>
      @keyframes floatRotate {
        0% {
          transform: translateY(0) rotate(-5deg);
        }

        50% {
          transform: translateY(-20px) rotate(5deg);
        }

        100% {
          transform: translateY(0) rotate(-5deg);
        }
      }

      @keyframes walkingDuo {
        0% {
          transform: translateX(-30px) rotate(-15deg);
        }

        50% {
          transform: translateX(0px) translateY(-10px) rotate(15deg);
        }

        100% {
          transform: translateX(30px) rotate(-15deg);
        }
      }
    </style>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
