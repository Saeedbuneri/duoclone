<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Duolingo - Learn a language for free!</title>
  <meta name="description"
    content="Duolingo is a fun, free, and effective way to learn a new language. Science-based lessons that actually work." />
  <meta name="keywords"
    content="learn, spanish, german, french, portuguese, italian, english, free, lessons, course, language, duolingo" />
  <meta property="og:title" content="Duolingo - Learn a language for free!" />
  <meta property="og:description"
    content="Learn languages by playing a game. It's 100% free, fun, and scientifically proven to work." />
  <link rel="icon" type="image/svg+xml" href="/duo-icon.svg" />
  <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="initial-loader"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.4s ease;gap:24px;">
    <div style="width: 300px; height: 300px;">
      <dotlottie-player
        src="https://lottie.host/14e6f4e6-f352-47d6-9b10-53717d4cf134/7iOtMXUauM.lottie"
        background="transparent"
        speed="1"
        style="width: 100%; height: 100%;"
        loop
        autoplay
      ></dotlottie-player>
    </div>
    <div style="width:200px;height:8px;background:#E5E5E5;border-radius:4px;overflow:hidden;margin-top: -40px;">
      <div style="height:100%;background:linear-gradient(90deg,#58CC02,#78CC02);border-radius:4px;animation:loadProgress 2.8s ease forwards;"></div>
    </div>
    <style>
      @keyframes loadProgress {
        0% { width: 0%; }
        60% { width: 70%; }
        90% { width: 90%; }
        100% { width: 100%; }
      }
    </style>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
